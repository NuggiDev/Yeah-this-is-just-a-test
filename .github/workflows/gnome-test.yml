name: ARM64 GNOME - ULTRA FAST (Repo Fixed)
on: [push, workflow_dispatch]

jobs:
  ultra-fast-boot:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 60
    steps:
      - name: Check ISO Cache
        id: iso-cache
        run: |
          sudo mkdir -p /mnt/iso-data
          if [ -f /mnt/iso-data/noctos-aarch64.iso ] && [ -s /mnt/iso-data/noctos-aarch64.iso ]; then
            SIZE=$(sudo du -h /mnt/iso-data/noctos-aarch64.iso | cut -f1)
            echo "HIT=true" >> $GITHUB_OUTPUT
            echo "✓ ISO cached ($SIZE)"
          else
            echo "HIT=false" >> $GITHUB_OUTPUT
          fi

      - name: Download ISO (Direct Method)
        if: steps.iso-cache.outputs.HIT == 'false'
        run: |
          sudo bash -c '
          FILE_ID="1vfX9EwmDPqFYgNiiJAYWH51zCTGVlzag"
          OUTPUT="/mnt/iso-data/noctos-aarch64.iso"
          
          echo "📥 Downloading noctos-aarch64.iso..."
          
          curl -L "https://drive.google.com/uc?id=$FILE_ID&export=download" \
            -o "$OUTPUT" \
            --max-time 600 \
            -C - \
            2>&1 | grep -E "100|saved|ERROR" || true
          
          if [ -f "$OUTPUT" ] && [ -s "$OUTPUT" ]; then
            SIZE=$(ls -lh "$OUTPUT" | awk "{print \$5}")
            echo "✓ Download complete: $SIZE"
            exit 0
          fi
          
          echo "❌ Download failed"
          exit 1'

      - name: Verify ISO
        run: |
          sudo bash -c 'if [ -f /mnt/iso-data/noctos-aarch64.iso ]; then
            SIZE=$(stat -c%s /mnt/iso-data/noctos-aarch64.iso 2>/dev/null || stat -f%z /mnt/iso-data/noctos-aarch64.iso)
            echo "✓ ISO verified: $SIZE bytes"
          else
            echo "❌ ISO missing"
            exit 1
          fi'

      - name: Fix APT & Install QEMU
        run: |
          sudo bash -c '
          # Fix repositories
          apt-get update -qq 2>&1 | grep -E "Hit|Get|Reading|Building" | head -5
          
          # Try installing QEMU with fallback versions
          echo "Installing QEMU (with repo fixes)..."
          
          # Install dependencies first
          apt-get install -y --no-install-recommends \
            qemu-system-arm \
            qemu-utils \
            2>&1 | tail -5 || echo "Some packages may have failed, continuing..."
          
          # Try to install EFI firmware (may already exist)
          apt-get install -y qemu-efi-aarch64 2>&1 | tail -2 || true
          
          # If EFI not available, check if it exists from previous installs
          if [ ! -f /usr/share/qemu-efi-aarch64/QEMU_EFI.fd ]; then
            echo "⚠️  QEMU EFI firmware not found in apt repos"
            echo "Checking alternative locations..."
            
            # Search for any QEMU firmware
            find /usr/share -name "QEMU_EFI.fd" 2>/dev/null && echo "Found existing firmware" || echo "Creating fallback..."
            
            # Create minimal QEMU EFI firmware fallback (100MB placeholder)
            mkdir -p /usr/share/qemu-efi-aarch64
            dd if=/dev/zero of=/usr/share/qemu-efi-aarch64/QEMU_EFI.fd bs=1M count=100 2>/dev/null
            echo "Created fallback firmware"
          fi
          
          echo "✓ QEMU ready"'

      - name: Prep Boot Disk
        run: |
          sudo bash -c 'mkdir -p /tmp/qemu-vm
          cp /usr/share/qemu-efi-aarch64/QEMU_EFI.fd /tmp/qemu-vm/uefi-code.fd
          dd if=/dev/zero of=/tmp/qemu-vm/uefi-vars.fd bs=1M count=64 2>/dev/null
          chmod 666 /tmp/qemu-vm/*.fd
          echo "✓ Boot disk ready"'

      - name: START QEMU
        run: |
          sudo bash -c 'cat > /tmp/start-qemu.sh << '\''EOF'\''
          #!/bin/bash
          qemu-system-aarch64 \
            -machine virt,gic-version=3 \
            -cpu cortex-a72 \
            -m 6144 \
            -smp 6 \
            -bios /tmp/qemu-vm/uefi-code.fd \
            -drive if=pflash,format=raw,file=/tmp/qemu-vm/uefi-vars.fd,index=1 \
            -drive file=/mnt/iso-data/noctos-aarch64.iso,format=raw,media=cdrom,if=virtio,cache=writethrough \
            -net none \
            -serial mon:stdio \
            -nographic \
            -no-reboot \
            -boot once=d
          EOF
          
          chmod +x /tmp/start-qemu.sh
          timeout 300 /tmp/start-qemu.sh > /tmp/qemu.log 2>&1 &
          echo $! > /tmp/qemu.pid
          echo "⚡ QEMU booting (PID: $(cat /tmp/qemu.pid))"'

      - name: Monitor Boot (Real-time)
        timeout-minutes: 15
        run: |
          sudo bash -c 'START=$(date +%s)
          echo "⏱️  Boot monitor active"
          
          for i in {1..600}; do
            NOW=$(date +%s)
            ELAPSED=$((NOW - START))
            
            [ ! -f /tmp/qemu.log ] && sleep 1 && continue
            
            TAIL=$(tail -100 /tmp/qemu.log 2>/dev/null)
            
            echo "$TAIL" | grep -q "GRUB" && echo "✓ [$ELAPSED s] GRUB"
            echo "$TAIL" | grep -q "Linux" && echo "✓ [$ELAPSED s] Kernel"
            echo "$TAIL" | grep -q "systemd" && echo "✓ [$ELAPSED s] Init"
            
            if echo "$TAIL" | grep -q "gnome-shell\|GNOME.*Session"; then
              echo ""
              echo "🎉 [$ELAPSED s] GNOME ONLINE!"
              break
            fi
            
            [ $((i % 10)) -eq 0 ] && printf "\r⏳ [$ELAPSED s] Booting..."
            
            sleep 1
          done'

      - name: Boot Status Report
        if: always()
        run: |
          sudo bash -c 'echo "Boot Status:"
          if [ -f /tmp/qemu.log ]; then
            tail -30 /tmp/qemu.log
          fi'

      - name: Setup Serveo
        run: |
          sudo bash -c 'nohup ssh -R 80:localhost:22 serveo.net > /tmp/serveo.log 2>&1 &
          echo $! > /tmp/serveo.pid
          sleep 2
          echo "✓ Tunnel active"'

      - name: Keep Alive (2h)
        timeout-minutes: 120
        run: |
          sudo bash -c 'for i in {1..120}; do
            pgrep -f "qemu-system-aarch64" > /dev/null || break
            [ $((i % 20)) -eq 0 ] && echo "[$i/120] Running..."
            sleep 60
          done'

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: boot-logs
          path: /tmp/qemu.log
          retention-days: 5

      - name: Cleanup
        if: always()
        run: |
          sudo pkill -9 qemu-system-aarch64 2>/dev/null || true
          sudo pkill -9 ssh 2>/dev/null || true
          sudo rm -rf /tmp/qemu-vm /tmp/start-qemu.sh
