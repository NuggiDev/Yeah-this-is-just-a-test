      - name: Extract Custom ISO & Mount Native Layout
        run: |
          sudo apt-get install -y tmux tigervnc-standalone-server novnc dbus-x11 squashfs-tools
          
          mkdir -p /tmp/iso-mount "$GITHUB_WORKSPACE/custom-os"
          
          echo "Mounting ISO..."
          sudo mount -o loop "$GITHUB_WORKSPACE/iso-data/noctos-aarch64.iso" /tmp/iso-mount
          
          echo "=== Full ISO Structure ==="
          sudo ls -la /tmp/iso-mount/
          sudo find /tmp/iso-mount -maxdepth 3 -type f | head -20 || true
          
          # Try common Arch locations
          SFS_PATH=$(sudo find /tmp/iso-mount -type f \( -name "airootfs.sfs" -o -name "*.squashfs" -o -name "*.sfs" \) 2>/dev/null | head -n 1)
          
          if [ -n "$SFS_PATH" ]; then
            echo "✅ Found SquashFS: $SFS_PATH"
            sudo unsquashfs -d "$GITHUB_WORKSPACE/custom-os" -f "$SFS_PATH"
          elif [ -d "/tmp/iso-mount/airootfs" ]; then
            echo "✅ airootfs directory found (not compressed). Copying directly..."
            sudo cp -a /tmp/iso-mount/airootfs/* "$GITHUB_WORKSPACE/custom-os/" 2>/dev/null || true
            sudo cp -a /tmp/iso-mount/airootfs/. "$GITHUB_WORKSPACE/custom-os/" 2>/dev/null || true
          else
            echo "⚠️ No airootfs found. Copying everything..."
            sudo cp -a /tmp/iso-mount/* "$GITHUB_WORKSPACE/custom-os/" 2>/dev/null || true
          fi
          
          sudo umount /tmp/iso-mount || true
          
          echo "Extracted size:"
          sudo du -sh "$GITHUB_WORKSPACE/custom-os"
          
          # Bind system dirs
          sudo mount --bind /dev "$GITHUB_WORKSPACE/custom-os/dev"
          sudo mount --bind /sys "$GITHUB_WORKSPACE/custom-os/sys"
          sudo mount --bind /proc "$GITHUB_WORKSPACE/custom-os/proc"
          sudo mount --bind /dev/pts "$GITHUB_WORKSPACE/custom-os/dev/pts" 2>/dev/null || true
          sudo mount --bind /run "$GITHUB_WORKSPACE/custom-os/run" 2>/dev/null || true
