name: Test ARM64 GNOME OS with GRUB UEFI Boot + Serveo Tunnel
on: [push, workflow_dispatch]

jobs:
  uefi-grub-boot-test:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 180
    steps:
      - name: Install gdown & Pull ISO from Google Drive
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y python3-pip
          sudo pip3 install gdown --break-system-packages -q
          sudo mkdir -p /mnt/iso-data
          sudo bash -c 'echo "Downloading ISO from Google Drive..."'
          sudo gdown "1vfX9EwmDPqFYgNiiJAYWH51zCTGVlzag" -O /mnt/iso-data/noctos-aarch64.iso --quiet
          sudo bash -c 'if [ ! -f /mnt/iso-data/noctos-aarch64.iso ]; then echo "ERROR: ISO download failed"; exit 1; fi'
          sudo bash -c 'ls -lh /mnt/iso-data/noctos-aarch64.iso && echo "✓ ISO downloaded"'

      - name: Install QEMU and UEFI Tools
        run: |
          sudo apt-get install -y qemu-system-arm qemu-efi-aarch64 qemu-utils
          sudo bash -c 'if [ ! -f /usr/share/qemu-efi-aarch64/QEMU_EFI.fd ]; then echo "ERROR: ARM64 UEFI firmware not found"; exit 1; fi'
          sudo bash -c 'echo "✓ QEMU and UEFI firmware installed"'

      - name: Create UEFI Boot Environment
        run: |
          sudo mkdir -p /tmp/qemu-vm
          sudo cp /usr/share/qemu-efi-aarch64/QEMU_EFI.fd /tmp/qemu-vm/uefi-code.fd
          sudo dd if=/dev/zero of=/tmp/qemu-vm/uefi-vars.fd bs=1M count=64 2>/dev/null
          sudo chmod 666 /tmp/qemu-vm/*.fd
          sudo qemu-img create -f qcow2 /tmp/qemu-vm/system-disk.qcow2 30G
          sudo bash -c 'echo "✓ UEFI boot environment created"'

      - name: Launch QEMU with ARM64 GRUB Boot
        run: |
          sudo bash -c 'cat > /tmp/start-qemu.sh << '\''EOF'\''
          #!/bin/bash
          qemu-system-aarch64 \
            -machine virt \
            -cpu cortex-a72 \
            -m 4096 \
            -smp 4 \
            -bios /tmp/qemu-vm/uefi-code.fd \
            -drive if=pflash,format=raw,file=/tmp/qemu-vm/uefi-vars.fd,index=1 \
            -drive file=/mnt/iso-data/noctos-aarch64.iso,format=raw,media=cdrom,index=2 \
            -drive file=/tmp/qemu-vm/system-disk.qcow2,format=qcow2,index=0 \
            -net nic,model=virtio \
            -net user \
            -serial mon:stdio \
            -nographic
          EOF'
          sudo chmod +x /tmp/start-qemu.sh
          sudo bash /tmp/start-qemu.sh > /tmp/qemu.log 2>&1 &
          sudo bash -c 'QEMU_PID=$!; echo $QEMU_PID > /tmp/qemu.pid; echo "✓ QEMU started with PID: $QEMU_PID"'
          sudo sleep 5

      - name: Setup Serveo Tunnel
        run: |
          sudo bash -c 'echo "Setting up serveo tunnel..."'
          sudo bash -c 'nohup ssh -R 80:localhost:22 serveo.net > /tmp/serveo.log 2>&1 &'
          sudo bash -c 'SERVEO_PID=$!; echo $SERVEO_PID > /tmp/serveo.pid; echo "✓ Serveo tunnel initialized (PID: $SERVEO_PID)"'
          sudo sleep 3
          sudo bash -c 'if grep -q "Forwarding HTTP\|Forwarding SSH" /tmp/serveo.log; then grep "Forwarding" /tmp/serveo.log | head -1; else echo "Serveo setup in progress..."; fi'

      - name: Monitor Boot and Display Status
        timeout-minutes: 30
        run: |
          sudo bash -c 'cat << '\''EOF'\''
          ==========================================
          🖥️  ARM64 GNOME OS BOOTING WITH GRUB
          ==========================================
          
          ⏳ Boot sequence starting...
             UEFI → GRUB → ISO Boot → GNOME Session
          EOF'
          
          sudo bash -c 'for i in {1..180}; do
            REMAINING=$((180 - i))
            
            if [ -f /tmp/qemu.log ]; then
              if grep -q "GRUB" /tmp/qemu.log; then
                echo "✓ GRUB bootloader detected"
              fi
              
              if grep -q "EFI stub\|Arch Linux\|Linux version" /tmp/qemu.log; then
                echo "✓ Kernel loading..."
              fi
              
              if grep -q "GNOME Session\|gnome-shell\|systemd" /tmp/qemu.log; then
                echo "✓ GNOME session started!"
                break
              fi
            fi
            
            if [ $((i % 3)) -eq 0 ]; then
              echo "[$i/180] Boot in progress... ($REMAINING/60 min) | $(date +%H:%M:%S)"
            fi
            
            sleep 10
          done'
          
          sudo bash -c 'echo ""; echo "Boot monitoring complete"'

      - name: Display Connection Info
        run: |
          sudo bash -c 'cat << '\''EOF'\''
          ==========================================
          🌐 CONNECTION INFORMATION
          ==========================================
          EOF'
          
          sudo bash -c 'if [ -f /tmp/serveo.log ]; then
            echo "Serveo Tunnel Status:"
            grep -E "Forwarding|Port|Error" /tmp/serveo.log | head -10
          fi'
          
          sudo bash -c 'cat << '\''EOF'\''
          
          📋 System running on:
             - QEMU ARM64 (cortex-a72)
             - UEFI Firmware with GRUB bootloader
             - 4 vCPUs, 4GB RAM
          
          Check logs for boot details:
             QEMU Log: /tmp/qemu.log
             Serveo Log: /tmp/serveo.log
          
          ==========================================
          EOF'

      - name: Keep System Running for Testing
        timeout-minutes: 120
        run: |
          sudo bash -c 'echo "Keeping QEMU and tunnels alive for 2 hours..."
          echo "System is ready for testing via Serveo tunnel"
          echo ""
          
          for i in {1..120}; do
            REMAINING=$((120 - i))
            
            if ! pgrep -f "qemu-system-aarch64" > /dev/null; then
              echo "⚠ QEMU process has terminated"
              echo ""
              echo "Last 50 lines of QEMU output:"
              tail -50 /tmp/qemu.log
              break
            fi
            
            if [ $((i % 10)) -eq 0 ]; then
              echo "[$i/120] System active ($REMAINING min remaining) | $(date +%H:%M:%S)"
            fi
            
            sleep 60
          done
          
          echo "Test window closed or timeout reached"'

      - name: Upload Boot Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: boot-logs
          path: |
            /tmp/qemu.log
            /tmp/serveo.log
          retention-days: 7

      - name: Cleanup
        if: always()
        run: |
          sudo bash -c 'echo "Cleaning up..."'
          sudo bash -c 'if [ -f /tmp/qemu.pid ]; then kill -9 $(cat /tmp/qemu.pid) 2>/dev/null || true; fi'
          sudo bash -c 'if [ -f /tmp/serveo.pid ]; then kill -9 $(cat /tmp/serveo.pid) 2>/dev/null || true; fi'
          sudo bash -c 'pkill -9 qemu-system-aarch64 2>/dev/null || true'
          sudo bash -c 'pkill -9 ssh 2>/dev/null || true'
          sudo bash -c 'rm -rf /tmp/qemu-vm /tmp/start-qemu.sh'
          sudo bash -c 'echo "✓ Cleanup complete"'
