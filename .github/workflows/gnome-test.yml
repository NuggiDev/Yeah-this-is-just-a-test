name: ARM64 GNOME - VNC (Self-Hosted ISO via ngrok)
on: [push, workflow_dispatch]

jobs:
  gnome-chroot-desktop:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 180
    steps:
      - name: Download ISO (from self-hosted server)
        run: |
          sudo bash -c '
          mkdir -p /mnt/iso-data
          ISO_URL="https://headroom-suave-lapel.ngrok-free.dev/noctos-aarch64.iso"
          OUTPUT="/mnt/iso-data/noctos-aarch64.iso"
          
          echo "Downloading from: $ISO_URL"
          
          curl -L "$ISO_URL" \
            -o "$OUTPUT" \
            --max-time 1800 \
            -C - \
            2>&1 | tail -10
          
          if [ -f "$OUTPUT" ] && [ -s "$OUTPUT" ]; then
            SIZE=$(ls -lh $OUTPUT | awk '\''{print $5}'\'')
            echo "✓ Downloaded: $SIZE"
            exit 0
          else
            echo "❌ Download failed"
            exit 1
          fi'

      - name: Mount & Extract
        run: |
          sudo bash -c '
          mkdir -p /tmp/iso-mount /mnt/custom-os
          mount -o loop /mnt/iso-data/noctos-aarch64.iso /tmp/iso-mount
          
          SFS=$(find /tmp/iso-mount -name "*.squashfs" -o -name "*.sfs" 2>/dev/null | head -1)
          [ -n "$SFS" ] && unsquashfs -d /mnt/custom-os -f "$SFS" 2>&1 | tail -1 || cp -a /tmp/iso-mount/* /mnt/custom-os/ 2>/dev/null
          
          umount /tmp/iso-mount
          echo "✓ Extracted"'

      - name: Setup Chroot
        run: |
          sudo bash -c '
          mkdir -p /mnt/custom-os/{dev,sys,proc,dev/pts,tmp,run}
          mount --bind /dev /mnt/custom-os/dev
          mount --bind /sys /mnt/custom-os/sys
          mount --bind /proc /mnt/custom-os/proc
          mount --bind /dev/pts /mnt/custom-os/dev/pts
          chmod 1777 /mnt/custom-os/{tmp,run}
          echo "✓ Chroot ready"'

      - name: Install & Start GNOME
        run: |
          sudo bash -c '
          [ -f /mnt/custom-os/usr/bin/pacman ] && chroot /mnt/custom-os bash -c "pacman-key --init 2>/dev/null; pacman-key --populate archlinuxarm 2>/dev/null; pacman -Sy --noconfirm gnome-session gnome-shell tigervnc dbus 2>&1 | tail -1" || true
          
          cat > /mnt/custom-os/start-desktop.sh << '\''EOF'\''
          #!/bin/bash
          export $(dbus-launch)
          export XDG_RUNTIME_DIR=/run/user/0
          mkdir -p $XDG_RUNTIME_DIR
          chmod 700 $XDG_RUNTIME_DIR
          export DISPLAY=:1
          vncserver :1 -geometry 1280x720 -depth 24 -SecurityTypes None
          gnome-session &
          wait
          EOF
          chmod +x /mnt/custom-os/start-desktop.sh
          
          nohup chroot /mnt/custom-os /bin/bash /start-desktop.sh > /tmp/desktop.log 2>&1 &
          sleep 5
          echo "✓ GNOME started"'

      - name: Start VNC Bridge
        run: |
          sudo bash -c '
          apt-get install -y novnc 2>&1 | tail -1
          nohup websockify --web=/usr/share/novnc/ 8080 localhost:5901 > /tmp/vnc.log 2>&1 &
          sleep 2
          echo "✓ VNC active"'

      - name: Download & Start ngrok
        run: |
          sudo bash -c '
          echo "Getting ngrok..."
          cd /tmp
          wget -q https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-linux-arm64.zip
          unzip -q ngrok-v3-stable-linux-arm64.zip
          chmod +x ngrok
          
          echo "Starting ngrok..."
          ./ngrok http 8080 --log=stdout > /tmp/ngrok-raw.log 2>&1 &
          
          sleep 15
          echo "✓ ngrok started"'

      - name: Extract & Display ngrok URL
        run: |
          sudo bash -c '
          echo ""
          echo "=========================================="
          echo "🌐 PUBLIC VNC URL"
          echo "=========================================="
          echo ""
          
          sleep 5
          
          if [ -f /tmp/ngrok-raw.log ]; then
            URL=$(grep -oP "https://[a-z0-9\-]+\.ngrok[^\s]+" /tmp/ngrok-raw.log | head -1)
            
            if [ -n "$URL" ]; then
              echo "✅ COPY THIS URL:"
              echo ""
              echo "$URL"
              echo ""
              echo "✅ Open in browser: $URL/vnc.html"
              echo ""
            else
              echo "⚠️  URL not found yet, showing log:"
              cat /tmp/ngrok-raw.log | head -30
            fi
          else
            echo "❌ ngrok log not found"
          fi
          
          echo "=========================================="
          echo ""'

      - name: Monitor & Display URL
        timeout-minutes: 120
        run: |
          sudo bash -c '
          for i in {1..120}; do
            if [ $((i % 2)) -eq 0 ]; then
              echo "[$i/120] Running..."
              
              if [ -f /tmp/ngrok-raw.log ]; then
                URL=$(grep -oP "https://[a-z0-9\-]+\.ngrok[^\s]+" /tmp/ngrok-raw.log | head -1)
                [ -n "$URL" ] && echo "📡 URL: $URL" || echo "Waiting for URL..."
              fi
            fi
            sleep 60
          done'

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-logs
          path: |
            /tmp/desktop.log
            /tmp/vnc.log
            /tmp/ngrok-raw.log
          retention-days: 5

      - name: Cleanup
        if: always()
        run: |
          sudo bash -c '
          pkill -9 chroot vncserver websockify ngrok 2>/dev/null || true
          umount /mnt/custom-os/{dev/pts,dev,sys,proc} 2>/dev/null || true
          rm -rf /mnt/custom-os /tmp/iso-mount'
