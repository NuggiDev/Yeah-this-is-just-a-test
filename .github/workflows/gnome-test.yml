name: Test Native ARM64 GNOME OS from Google Drive ISO

on: [push, workflow_dispatch]

jobs:
  launch-desktop:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Install gdown & Pull ISO from Google Drive
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip curl
          
          pip3 install gdown --break-system-packages
          
          mkdir -p "$GITHUB_WORKSPACE/iso-data"
          
          echo "Downloading NoctOS aarch64 ISO..."
          gdown "1vfX9EwmDPqFYgNiiJAYWH51zCTGVlzag" \
                -O "$GITHUB_WORKSPACE/iso-data/noctos-aarch64.iso"
          
          ls -lh "$GITHUB_WORKSPACE/iso-data/"

      - name: Extract Custom ISO & Mount Native Layout
        run: |
          sudo apt-get install -y tmux tigervnc-standalone-server novnc dbus-x11 squashfs-tools
          
          mkdir -p /tmp/iso-mount "$GITHUB_WORKSPACE/custom-os"
          
          echo "Mounting ISO..."
          sudo mount -o loop "$GITHUB_WORKSPACE/iso-data/noctos-aarch64.iso" /tmp/iso-mount || { echo "Mount failed!"; exit 1; }
          
          echo "=== FULL ISO STRUCTURE ==="
          sudo ls -la /tmp/iso-mount/
          echo "--------------------------------"
          sudo find /tmp/iso-mount -maxdepth 4 -type f | head -20 || true
          echo "--------------------------------"
          
          # Copy from airootfs (your pacstrap build)
          if [ -d "/tmp/iso-mount/airootfs" ]; then
            echo "✅ Found airootfs directory - copying rootfs..."
            sudo cp -a /tmp/iso-mount/airootfs/. "$GITHUB_WORKSPACE/custom-os/" || true
          else
            echo "⚠️ No airootfs found, copying everything..."
            sudo cp -a /tmp/iso-mount/. "$GITHUB_WORKSPACE/custom-os/" 2>/dev/null || true
          fi
          
          sudo umount /tmp/iso-mount 2>/dev/null || true
          
          echo "Extracted size:"
          sudo du -sh "$GITHUB_WORKSPACE/custom-os" || true
          
          # Bind mounts
          for dir in dev sys proc dev/pts run; do
            sudo mkdir -p "$GITHUB_WORKSPACE/custom-os/$dir"
            sudo mount --bind "/$dir" "$GITHUB_WORKSPACE/custom-os/$dir" 2>/dev/null || true
          done

      - name: Start GNOME & Stream Display
        run: |
          echo "Creating desktop startup script..."
          sudo bash -c 'cat << "EOF" > '"$GITHUB_WORKSPACE"'/custom-os/start-desktop.sh
          #!/bin/bash
          set -e

          export XDG_RUNTIME_DIR=/tmp/runtime-root
          mkdir -p "$XDG_RUNTIME_DIR"
          chmod 700 "$XDG_RUNTIME_DIR"

          export DISPLAY=:1
          export XDG_CURRENT_DESKTOP=GNOME

          # Start D-Bus
          eval $(dbus-launch --sh-syntax)

          echo "Starting TigerVNC server..."
          vncserver :1 -geometry 1280x720 -depth 24 -SecurityTypes None -localhost no

          echo "Starting GNOME session..."
          gnome-session --session=gnome &

          echo "Desktop started. Keeping session alive..."
          tail -f /dev/null
          EOF'

          sudo chmod +x "$GITHUB_WORKSPACE/custom-os/start-desktop.sh"

          # Start noVNC
          tmux new-session -d -s novnc "websockify --web=/usr/share/novnc/ 8080 localhost:5901"

          echo "Launching desktop in chroot..."
          sudo chroot "$GITHUB_WORKSPACE/custom-os" /bin/bash /start-desktop.sh &

          sleep 12

          echo "=========================================================="
          echo "          LIVE ARM64 GNOME DESKTOP READY"
          echo "=========================================================="

          echo "Creating public tunnel with localhost.run..."
          ssh -o StrictHostKeyChecking=no -R 80:localhost:8080 noc@ssh.localhost.run &

          echo ""
          echo "✅ Open this link in your browser:"
          echo "   https://noc.ssh.localhost.run"
          echo ""
          echo "Keep this workflow running to keep the desktop alive."
          
          # Keep workflow alive
          tail -f /dev/null
