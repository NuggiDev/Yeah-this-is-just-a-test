#k
name: ARM64 GNOME - VNC Desktop (Public Access via ngrok)
on: [push, workflow_dispatch]

jobs:
  gnome-chroot-desktop:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 180
    steps:
      - name: Install gdown & Download ISO (With Retries)
        run: |
          sudo bash -c '
          apt-get update -qq
          apt-get install -y python3-pip
          python3 -m pip install gdown --break-system-packages -q
          
          mkdir -p /mnt/iso-data
          
          FILE_ID="1vfX9EwmDPqFYgNiiJAYWH51zCTGVlzag"
          OUTPUT="/mnt/iso-data/noctos-aarch64.iso"
          
          echo "📥 Downloading ISO from Google Drive (with retries)..."
          
          for attempt in {1..5}; do
            echo ""
            echo "Attempt $attempt/5..."
            
            gdown "$FILE_ID" -O "$OUTPUT" --quiet 2>&1 && {
              SIZE=$(stat -c%s "$OUTPUT" 2>/dev/null)
              if [ $SIZE -gt 1000000000 ]; then
                echo "✓ Download successful: $(numfmt --to=iec $SIZE 2>/dev/null || echo $SIZE bytes)"
                exit 0
              fi
            }
            
            WAIT=$((30 * attempt))
            echo "⏳ Rate limited, waiting ${WAIT}s before retry..."
            sleep $WAIT
          done
          
          echo "❌ Download failed after 5 attempts"
          exit 1'

      - name: Verify ISO
        run: |
          sudo bash -c 'if [ -f /mnt/iso-data/noctos-aarch64.iso ]; then
            SIZE=$(stat -c%s /mnt/iso-data/noctos-aarch64.iso 2>/dev/null || stat -f%z /mnt/iso-data/noctos-aarch64.iso)
            SIZE_GB=$((SIZE / 1073741824))
            echo "✓ ISO verified: ${SIZE_GB}GB"
          else
            echo "❌ ISO missing"
            exit 1
          fi'

      - name: Install Tools for ISO Mounting
        run: |
          sudo bash -c '
          echo "Installing ISO tools..."
          apt-get install -y squashfs-tools dmsetup 2>&1 | tail -3
          echo "✓ Tools ready"'

      - name: Mount ISO & Extract Filesystem
        run: |
          sudo bash -c '
          echo "Mounting ISO..."
          mkdir -p /tmp/iso-mount
          mkdir -p /mnt/custom-os
          
          mount -o loop /mnt/iso-data/noctos-aarch64.iso /tmp/iso-mount
          
          echo "Looking for filesystem..."
          if [ -f /tmp/iso-mount/arch/x86_64/airootfs.sfs ]; then
            echo "Found x86_64 SquashFS"
            SFS_PATH="/tmp/iso-mount/arch/x86_64/airootfs.sfs"
          elif [ -f /tmp/iso-mount/arch/boot/aarch64/airootfs.sfs ]; then
            echo "Found ARM64 SquashFS"
            SFS_PATH="/tmp/iso-mount/arch/boot/aarch64/airootfs.sfs"
          elif [ -f /tmp/iso-mount/live/filesystem.squashfs ]; then
            echo "Found live SquashFS"
            SFS_PATH="/tmp/iso-mount/live/filesystem.squashfs"
          else
            echo "No SquashFS found, copying raw ISO contents..."
            cp -a /tmp/iso-mount/* /mnt/custom-os/ 2>/dev/null || true
            SFS_PATH=""
          fi
          
          if [ -n "$SFS_PATH" ] && [ -f "$SFS_PATH" ]; then
            echo "Extracting SquashFS to /mnt/custom-os..."
            unsquashfs -d /mnt/custom-os -f "$SFS_PATH" 2>&1 | tail -3
            echo "✓ Extraction complete"
          fi
          
          umount /tmp/iso-mount
          echo "✓ ISO mounted and extracted"'

      - name: Setup Chroot Environment
        run: |
          sudo bash -c '
          echo "Setting up chroot filesystem..."
          
          mkdir -p /mnt/custom-os/{dev,sys,proc,dev/pts,tmp,run}
          
          mount --bind /dev /mnt/custom-os/dev
          mount --bind /sys /mnt/custom-os/sys
          mount --bind /proc /mnt/custom-os/proc
          mount --bind /dev/pts /mnt/custom-os/dev/pts
          
          chmod 1777 /mnt/custom-os/tmp
          chmod 1777 /mnt/custom-os/run
          
          echo "✓ Chroot environment ready"'

      - name: Install GNOME & Display Server
        run: |
          sudo bash -c '
          echo "Installing packages in chroot..."
          
          if command -v pacman &> /dev/null || [ -f /mnt/custom-os/usr/bin/pacman ]; then
            echo "Using pacman..."
            chroot /mnt/custom-os bash -c "
              pacman-key --init 2>/dev/null || true
              pacman-key --populate archlinuxarm 2>/dev/null || true
              pacman -Sy --noconfirm --needed gnome-session gnome-shell tigervnc dbus xorg-server 2>&1 | tail -5 || true
            "
          else
            echo "pacman not found, skipping package install"
          fi
          
          echo "✓ Packages installed"'

      - name: Create Desktop Startup Script
        run: |
          sudo bash -c 'cat > /mnt/custom-os/start-desktop.sh << '\''DESKTOP_EOF'\''
          #!/bin/bash
          
          export $(dbus-launch)
          
          export XDG_RUNTIME_DIR=/run/user/0
          mkdir -p $XDG_RUNTIME_DIR
          chmod 700 $XDG_RUNTIME_DIR
          
          export DISPLAY=:1
          export XDG_CURRENT_DESKTOP=GNOME
          
          vncserver :1 -geometry 1280x720 -depth 24 -SecurityTypes None || true
          
          gnome-session &
          
          wait
          DESKTOP_EOF
          
          chmod +x /mnt/custom-os/start-desktop.sh
          echo "✓ Startup script created"'

      - name: Start Desktop in Chroot
        run: |
          sudo bash -c '
          echo "Starting GNOME desktop..."
          
          nohup chroot /mnt/custom-os /bin/bash /start-desktop.sh > /tmp/desktop.log 2>&1 &
          DESKTOP_PID=$!
          echo $DESKTOP_PID > /tmp/desktop.pid
          
          echo "✓ Desktop started (PID: $DESKTOP_PID)"
          sleep 5'

      - name: Setup VNC Web Bridge (noVNC)
        run: |
          sudo bash -c '
          echo "Installing noVNC..."
          apt-get install -y novnc 2>&1 | tail -2 || echo "noVNC already installed"
          
          echo "Starting websockify bridge..."
          nohup websockify --web=/usr/share/novnc/ 8080 localhost:5901 > /tmp/websockify.log 2>&1 &
          WS_PID=$!
          echo $WS_PID > /tmp/websockify.pid
          
          sleep 2
          echo "✓ Web bridge active (PID: $WS_PID)"'

      - name: Setup ngrok Tunnel for Public Access
        run: |
          sudo bash -c '
          echo "Installing ngrok..."
          wget -q https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-linux-arm64.zip -O /tmp/ngrok.zip
          unzip -q /tmp/ngrok.zip -d /usr/local/bin/
          chmod +x /usr/local/bin/ngrok
          
          echo "Starting ngrok tunnel on port 8080..."
          nohup ngrok http 8080 > /tmp/ngrok.log 2>&1 &
          NGROK_PID=$!
          echo $NGROK_PID > /tmp/ngrok.pid
          
          sleep 5
          
          echo "✓ ngrok tunnel started (PID: $NGROK_PID)"
          echo ""
          echo "🌐 PUBLIC VNC ACCESS:"
          if grep -q "url=" /tmp/ngrok.log; then
            echo ""
            grep "url=" /tmp/ngrok.log | head -1
            echo ""
            echo "Open this URL in your browser and click the VNC link!"
          else
            echo "Tunnel initializing, check logs in 10 seconds..."
          fi'

      - name: Display Connection Info
        run: |
          sudo bash -c 'cat << '\''INFO_EOF'\''
          ==========================================
          🖥️  ARM64 GNOME DESKTOP ONLINE
          ==========================================
          
          ✓ ISO Downloaded
          ✓ Filesystem Extracted
          ✓ Chroot Setup
          ✓ GNOME Started
          ✓ VNC Bridge Active
          ✓ Public Tunnel Active
          
          📡 PUBLIC URL:
          Check the ngrok output above ⬆️
          
          It looks like: https://XXXX-XXXX-XXXX.ngrok-free.app
          
          Open that URL → Click VNC tab → Connect!
          
          ==========================================
          INFO_EOF'

      - name: Keep Services Alive (2 hours)
        timeout-minutes: 120
        run: |
          sudo bash -c '
          echo "Services running..."
          echo ""
          
          # Show ngrok URL every 30 seconds
          for i in {1..120}; do
            if [ $((i % 6)) -eq 0 ]; then
              echo "[$i/120] Services active..."
              if [ -f /tmp/ngrok.log ]; then
                NGROK_URL=$(grep "url=" /tmp/ngrok.log | head -1)
                if [ -n "$NGROK_URL" ]; then
                  echo "📡 Access: $NGROK_URL"
                fi
              fi
            fi
            sleep 60
          done'

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-logs
          path: |
            /tmp/desktop.log
            /tmp/websockify.log
            /tmp/ngrok.log
          retention-days: 5

      - name: Cleanup
        if: always()
        run: |
          sudo bash -c '
          echo "Cleaning up..."
          
          pkill -9 chroot 2>/dev/null || true
          pkill -9 vncserver 2>/dev/null || true
          pkill -9 websockify 2>/dev/null || true
          pkill -9 ngrok 2>/dev/null || true
          
          umount /mnt/custom-os/dev/pts 2>/dev/null || true
          umount /mnt/custom-os/dev 2>/dev/null || true
          umount /mnt/custom-os/sys 2>/dev/null || true
          umount /mnt/custom-os/proc 2>/dev/null || true
          
          rm -rf /mnt/custom-os /tmp/iso-mount
          
          echo "✓ Cleanup complete"'
