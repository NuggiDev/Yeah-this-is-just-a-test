name: Test Native ARM64 GNOME OS from Google Drive ISO

on: [push, workflow_dispatch]

jobs:
  launch-desktop:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Install gdown & Pull ISO from Google Drive
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip curl
          
          pip3 install gdown --break-system-packages
          
          mkdir -p "$GITHUB_WORKSPACE/iso-data"
          
          echo "Downloading NoctOS aarch64 ISO..."
          gdown "1vfX9EwmDPqFYgNiiJAYWH51zCTGVlzag" \
                -O "$GITHUB_WORKSPACE/iso-data/noctos-aarch64.iso"
          
          ls -lh "$GITHUB_WORKSPACE/iso-data/"

      - name: Extract Custom ISO & Mount Native Layout
        run: |
          sudo apt-get install -y tmux tigervnc-standalone-server novnc dbus-x11 squashfs-tools
          
          mkdir -p /tmp/iso-mount "$GITHUB_WORKSPACE/custom-os"
          
          echo "Mounting ISO..."
          sudo mount -o loop "$GITHUB_WORKSPACE/iso-data/noctos-aarch64.iso" /tmp/iso-mount || { echo "Mount failed!"; exit 1; }
          
          echo "=== FULL ISO STRUCTURE ==="
          sudo ls -la /tmp/iso-mount/
          echo "--------------------------------"
          sudo find /tmp/iso-mount -maxdepth 5 -type f | head -30 || true
          echo "--------------------------------"
          
          # For pacstrap-built Arch ISO
          if sudo test -d "/tmp/iso-mount/airootfs"; then
            echo "✅ Found airootfs directory"
            sudo cp -a /tmp/iso-mount/airootfs/. "$GITHUB_WORKSPACE/custom-os/" || true
          elif sudo test -f "/tmp/iso-mount/airootfs.sfs"; then
            echo "✅ Found airootfs.sfs"
            sudo unsquashfs -d "$GITHUB_WORKSPACE/custom-os" -f "/tmp/iso-mount/airootfs.sfs"
          else
            echo "⚠️ Falling back to full copy"
            sudo cp -a /tmp/iso-mount/. "$GITHUB_WORKSPACE/custom
